name: tontine

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-tontine_dev}
      MYSQL_DATABASE: tontine_db
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - tontine_mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - tontine_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-tontine_dev}
      DB_NAME: tontine_db
    ports:
      - "${APP_PORT:-3000}:80"
    volumes:
      - .:/var/www/html
    networks:
      - tontine_net

  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT:-8085}:8080"
    depends_on:
      - db
    networks:
      - tontine_net

networks:
  tontine_net:

volumes:
  tontine_mysql_data:
