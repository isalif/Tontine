name: tontine

services:
  db:
    image: mariadb:11.2
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-tontine_dev}
      MARIADB_DATABASE: tontine_db
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - tontine_db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - tontine_net

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-tontine_dev}
      DB_NAME: tontine_db
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./frontend:/frontend
    networks:
      - tontine_net

  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT:-8085}:8080"
    depends_on:
      - db
    networks:
      - tontine_net

networks:
  tontine_net:

volumes:
  tontine_db_data:
